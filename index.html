<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Favorite Movie of All Time</title>
  <style>
    /* Cinematic Dark Theme */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
      color: #e0e0e0;
      padding: 40px 20px;
      margin: 0;
    }
    
    /* Movie Poster Inspired Container */
    form {
      background: #141414;
      padding: 30px;
      max-width: 500px;
      margin: auto;
      border-radius: 12px;
      border: 1px solid #333;
      box-shadow: 0 0 25px rgba(229, 9, 20, 0.4); /* Netflix Red Glow */
    }

    /* Form Title/Header effect if you add one later */
    form::before {
      content: "🎬 MOVIE SURVEY";
      display: block;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 2px;
      color: #e50914;
      margin-bottom: 20px;
      border-bottom: 2px dashed #333;
      padding-bottom: 10px;
    }
    
    label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #fff;
    }
    
    /* Sleek Inputs */
    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 6px;
      background-color: #222;
      color: #fff;
      border: 1px solid #444;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    
    /* Premium Focus Highlight */
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus,
    select:focus,
    textarea:focus {
      border-color: #ffcc00; /* Hollywood Gold */
      box-shadow: 0 0 8px rgba(255, 204, 0, 0.5);
      outline: none;
    }
    
    /* Ticket Stub Fieldset style */
    fieldset {
      margin-top: 25px;
      padding: 15px 20px;
      border-radius: 8px;
      border: 1px solid #ffcc00;
      background: rgba(255, 204, 0, 0.03);
    }
    
    legend {
      color: #ffcc00;
      font-weight: bold;
      padding: 0 10px;
      letter-spacing: 1px;
    }

    /* Checkbox & Radio button alignments */
    fieldset label {
      display: flex;
      align-items: center;
      margin-top: 10px;
      cursor: pointer;
      font-weight: normal;
      color: #ccc;
    }

    fieldset input[type="radio"],
    fieldset input[type="checkbox"] {
      margin-right: 10px;
      accent-color: #ffcc00; 
      transform: scale(1.1);
    }

    /* Range Slider Styling */
    .slider-container {
      margin-top: 8px;
    }
    input[type="range"] {
      width: 100%;
      accent-color: #e50914;
      background: #444;
      height: 6px;
      border-radius: 3px;
      cursor: pointer;
    }
    .slider-output {
      display: block;
      text-align: right;
      color: #ffcc00;
      font-weight: bold;
      margin-top: 5px;
    }
    
    button {
      width: 100%;
      margin-top: 25px;
      padding: 14px;
      background: #e50914;
      color: white;
      font-weight: bold;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    
    button:hover {
      background: #b20710;
      box-shadow: 0 0 15px rgba(229, 9, 20, 0.6);
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

<form id="googleForm">
  <label for="name">Your Name</label>
  <input type="text" name="name" id="name" required placeholder="John Doe">

  <label for="movieName">Movie Title</label>
  <input type="text" name="movieName" id="movieName" required placeholder="e.g., Inception">

  <!-- NEW ELEMENT: Watch Date input -->
  <label for="watchDate">When did you last watch it?</label>
  <input type="date" name="watchDate" id="watchDate">


  <fieldset>
    <legend>Primary Genre</legend>
    <label><input type="radio" name="genre" value="Horror"> Horror</label>
    <label><input type="radio" name="genre" value="Action"> Action</label>
    <label><input type="radio" name="genre" value="Comedy"> Comedy</label>
    <label><input type="radio" name="genre" value="Sci-Fi"> Sci-Fi</label>
    <label><input type="radio" name="genre" value="Other"> Other</label>
  </fieldset>

  <!-- NEW ELEMENT: Range Slider for Movie Score -->
  <label for="rating">Your Personal Score (out of 10)</label>
  <div class="slider-container">
    <input type="range" name="rating" id="rating" min="1" max="10" step="0.5" value="8" oninput="this.nextElementSibling.value = this.value + ' / 10'">
    <output class="slider-output">8 / 10</output>
  </div>

  <label for="comments">Why is it your favorite?</label>
  <textarea name="comments" id="comments" rows="4" placeholder="Share your review..."></textarea>

  <button type="submit">Submit Review</button>
</form>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbw6w37aKU5jirNFkgF5bPA58-q8fLIWjYc9-Bm8_zcA8SZt43eaw67leKzuT9jnfv2V/exec';
  const form = document.getElementById('googleForm');

  form.addEventListener('submit', e => {
    e.preventDefault(); 
    fetch(scriptURL, { method: 'POST', body: new FormData(form)})
      .then(response => {
        alert("Form submitted successfully!");
        form.reset();
        // Reset slider output manually back to default value
        document.querySelector('.slider-output').value = "8 / 10";
      })
      .catch(error => alert('Error!', error.message));
  });
</script>

</body>
</html>
